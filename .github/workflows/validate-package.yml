name: validate-and-package-skill

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  validate-package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install validator dependency
        run: |
          python -m pip install --upgrade pip pyyaml

      - name: Validate skill
        run: |
          python tools/quick_validate.py skill/zotero-vectorize

      - name: Package skill
        run: |
          python tools/package_skill.py skill/zotero-vectorize dist

      - name: Upload packaged skill
        uses: actions/upload-artifact@v4
        with:
          name: zotero-vectorize-skill
          path: dist/zotero-vectorize.skill
